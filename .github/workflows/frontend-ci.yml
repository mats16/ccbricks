name: Frontend CI

on:
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'packages/types/**'
      - 'packages/eslint-config/**'
      - 'packages/typescript-config/**'
      - 'turbo.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    paths:
      - 'apps/web/**'
      - 'packages/types/**'
      - 'packages/eslint-config/**'
      - 'packages/typescript-config/**'
      - 'turbo.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/frontend-ci.yml'

jobs:
  ci:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.16'
          cache: 'npm'

      - name: Restore dependencies cache
        id: deps-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-deps-frontend-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-deps-frontend-

      - name: Install dependencies
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-frontend-${{ hashFiles('**/package-lock.json', 'turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-frontend-

      - name: Build shared packages
        run: npx turbo run build --filter=@repo/types

      - name: Run lint
        run: npx turbo run lint --filter=@repo/web

      - name: Run type check
        run: npx turbo run type-check --filter=@repo/web

      - name: Run tests
        run: npx turbo run test --filter=@repo/web
