name: Backend CI

on:
  push:
    branches:
      - main
    paths:
      - 'apps/api/**'
      - 'packages/types/**'
      - 'packages/eslint-config/**'
      - 'packages/typescript-config/**'
      - 'turbo.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'apps/api/**'
      - 'packages/types/**'
      - 'packages/eslint-config/**'
      - 'packages/typescript-config/**'
      - 'turbo.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/backend-ci.yml'

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.16'
          cache: 'npm'

      - name: Restore dependencies cache
        id: deps-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-deps-backend-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-deps-backend-

      - name: Install dependencies
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-backend-${{ hashFiles('**/package-lock.json', 'turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-backend-

      - name: Build shared packages
        run: npx turbo run build --filter=@repo/types

      - name: Run lint
        run: npx turbo run lint --filter=@repo/api

      - name: Run type check
        run: npx turbo run type-check --filter=@repo/api

      - name: Run unit tests (exclude integration tests)
        run: npm test -- --exclude='**/integration.test.ts'
        working-directory: apps/api
        env:
          NODE_ENV: test

      - name: Run integration tests
        run: npm test -- integration.test.ts
        working-directory: apps/api
        env:
          NODE_ENV: test
          DATABRICKS_HOST: test.databricks.com
